databases:
  - name: fiba-db
    plan: free
    databaseName: fiba_stats
    postgresMajorVersion: "16"

services:
  # ── BACKEND (FastAPI) ──
  - type: web
    name: fiba-backend
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fiba-db
          property: connectionURI
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "8000"
      - key: SECRET_KEY
        value: "fiba-stats-secret-2025"

  # ── FRONTEND (React + Nginx) ──
  - type: web
    name: fiba-frontend
    runtime: docker
    plan: free
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: fiba-backend
          envVarKey: RENDER_EXTERNAL_URL
