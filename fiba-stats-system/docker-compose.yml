services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fiba-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app # Mapeo del código para Hot Reloading en desarrollo
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=sqlite:////app/fiba_stats.db # Apuntamos a la base de datos principal de 72K
      - PYTHONUNBUFFERED=1
    command: uvicorn app.app:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fiba-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped
