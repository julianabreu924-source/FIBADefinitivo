services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fiba-backend
    ports:
      - "8000:8000"
    volumes:
      - backend-db:/app/data # Volumen persistente para la DB
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=sqlite:////app/data/fiba_stats.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fiba-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-db:
